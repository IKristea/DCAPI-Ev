<!DOCTYPE html>
<html>

<head>
    <title>DCAPI Test v2</title>
</head>

<body style="font-family: sans-serif; padding: 20px">
    <h1>DCAPI Test (formate noi)</h1>
    <p>UA: <span id="ua"></span></p>
    <button id="b1" style="padding:15px;display:block;margin:10px 0">A: mdoc preview API (Google)</button>
    <button id="b2" style="padding:15px;display:block;margin:10px 0">B: org.iso.mdoc cu ALL fields</button>
    <button id="b3" style="padding:15px;display:block;margin:10px 0">C: openid4vp DC API spec</button>
    <button id="b4" style="padding:15px;display:block;margin:10px 0">D: preview-mdoc (legacy)</button>
    <pre id="r" style="background:#eee;padding:10px;white-space:pre-wrap;word-wrap:break-word"></pre>
    <script>
        document.getElementById('ua').textContent = navigator.userAgent;                                                                                                                                                                   
      const log = m => document.getElementById('r').textContent = m;                                                                                                                                                                     
      const run = async (label, opts) => {                                                                                                                                                                                             
        log(`Trying ${label}...`);                                                                                                                                                                                                       
        try {                                                                                                                                                                                                                            
          const c = await navigator.credentials.get(opts);
          log(`SUCCESS ${label}:\n` + JSON.stringify(c, null, 2));                                                                                                                                                                       
        } catch (e) {                                                                                                                                                                                                                    
          log(`ERROR ${label}:\n${e.name}: ${e.message}`);
        }                                                                                                                                                                                                                                
      };                                                                                                                                                                                                                               

      // A — Google's mdoc "preview" protocol (most common one wallets register against)                                                                                                                                                 
      document.getElementById('b1').onclick = () => run('A', {
        digital: {                                                                                                                                                                                                                       
          providers: [{                                                                                                                                                                                                                
            protocol: "preview",
            request: {                                                                                                                                                                                                                   
              selector: {
                format: ["mdoc"],                                                                                                                                                                                                        
                doctype: "eu.europa.ec.eudi.pid.1",                                                                                                                                                                                      
                fields: [
                  { namespace: "eu.europa.ec.eudi.pid.1", name: "given_name", intentToRetain: false },                                                                                                                                   
                  { namespace: "eu.europa.ec.eudi.pid.1", name: "family_name", intentToRetain: false }                                                                                                                                   
                ]                                                                                                                                                                                                                        
              },                                                                                                                                                                                                                         
              nonce: "test-" + Date.now(),                                                                                                                                                                                               
              readerPublicKey: "BLANK"                                                                                                                                                                                                 
            }                                                                                                                                                                                                                            
          }]
        }                                                                                                                                                                                                                                
      });                                                                                                                                                                                                                              

      // B — org.iso.mdoc with all common fields
      document.getElementById('b2').onclick = () => run('B', {
        digital: {                                                                                                                                                                                                                       
          providers: [{
            protocol: "org.iso.mdoc",                                                                                                                                                                                                    
            request: {                                                                                                                                                                                                                 
              docType: "eu.europa.ec.eudi.pid.1",
              nameSpaces: {                                                                                                                                                                                                              
                "eu.europa.ec.eudi.pid.1": {
                  "given_name": false,                                                                                                                                                                                                   
                  "family_name": false,                                                                                                                                                                                                
                  "birth_date": false,
                  "age_over_18": false,                                                                                                                                                                                                  
                  "nationality": false
                }                                                                                                                                                                                                                        
              }                                                                                                                                                                                                                        
            }
          }]
        }
      });

      // C — OpenID4VP DC API (newer)                                                                                                                                                                                                    
      document.getElementById('b3').onclick = () => run('C', {
        digital: {                                                                                                                                                                                                                       
          providers: [{                                                                                                                                                                                                                
            protocol: "openid4vp",
            request: JSON.stringify({
              response_type: "vp_token",                                                                                                                                                                                                 
              response_mode: "dc_api",
              client_id: "web-origin:" + window.location.origin,                                                                                                                                                                         
              nonce: "test-" + Date.now(),                                                                                                                                                                                               
              dcql_query: {
                credentials: [{                                                                                                                                                                                                          
                  id: "pid",                                                                                                                                                                                                           
                  format: "mso_mdoc",                                                                                                                                                                                                    
                  meta: { doctype_value: "eu.europa.ec.eudi.pid.1" },
                  claims: [                                                                                                                                                                                                              
                    { path: ["eu.europa.ec.eudi.pid.1", "given_name"] },                                                                                                                                                               
                    { path: ["eu.europa.ec.eudi.pid.1", "family_name"] }                                                                                                                                                                 
                  ]                                                                                                                                                                                                                      
                }]
              }                                                                                                                                                                                                                          
            })                                                                                                                                                                                                                         
          }]
        }
      });

      // D — older preview-mdoc protocol name                                                                                                                                                                                            
      document.getElementById('b4').onclick = () => run('D', {
        digital: {                                                                                                                                                                                                                       
          providers: [{                                                                                                                                                                                                                
            protocol: "preview-mdoc",
            request: {                                                                                                                                                                                                                   
              docType: "eu.europa.ec.eudi.pid.1",
              nameSpaces: {                                                                                                                                                                                                              
                "eu.europa.ec.eudi.pid.1": ["given_name", "family_name"]                                                                                                                                                               
              }                                                                                                                                                                                                                          
            }
          }]                                                                                                                                                                                                                             
        }                                                                                                                                                                                                                              
      });
    </script>
</body>

</html>
